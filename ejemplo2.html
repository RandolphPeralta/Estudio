<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-step Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">

<div class="container bg-white rounded shadow p-4">
  <div class="row">
    <!-- Sidebar -->
    <div class="col-md-3 bg-primary text-white rounded p-3">
      <div class="mb-4">
        <span class="badge bg-light text-dark rounded-circle">1</span>
        <span class="ms-2">Your Info</span>
      </div>
      <div class="mb-4">
        <span class="badge bg-light text-dark rounded-circle">2</span>
        <span class="ms-2">Select Plan</span>
      </div>
      <div class="mb-4">
        <span class="badge bg-light text-dark rounded-circle">3</span>
        <span class="ms-2">Add-ons</span>
      </div>
      <div class="mb-4">
        <span class="badge bg-light text-dark rounded-circle">4</span>
        <span class="ms-2">Summary</span>
      </div>
    </div>

    <!-- Step Content -->
    <div class="col-md-9">
      <h1 class="fw-bold text-primary">Personal Info</h1>
      <p class="text-muted">Please provide your name, email address, and phone number.</p>

      <form>
        <div class="mb-3">
          <label class="form-label">Name</label>
          <input type="text" class="form-control" placeholder="e.g. Stephen King" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control" placeholder="e.g. stephenking@lorem.com" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Phone Number</label>
          <input type="text" class="form-control" placeholder="e.g. +1 234 567 890" required>
        </div>
      </form>

      <div class="d-flex justify-content-end mt-4">
        <button class="btn btn-primary">Next Step</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
