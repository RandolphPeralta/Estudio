<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-secondary-subtle">

    <div class="container vh-100 d-flex justify-content-center align-items-center">

        <div class="bg-white rounded-4 shadow-lg col-10">

            <div class="row p-3">

                <div class="col-3 position-relative">

                    <img src="bg-sidebar.svg" class="img-fluid rounded-3 w-100" alt="Sidebar">

                    <div class="position-absolute top-0 start-0 p-4">

                        <div class="d-flex align-items-center mb-4">
                            <span class="badge rounded-circle text-bg-light me-3">1</span>

                            <div>
                                <small class="text-light">STEP 1</small>
                                <div class="text-white fw-bold">YOUR INFO</div>
                            </div>
                        </div>

                        <div class="d-flex align-items-center mb-4">
                            <span class="badge rounded-circle border me-3">2</span>

                            <div>
                                <small class="text-light">STEP 2</small>
                                <div class="text-white fw-bold">SELECT PLAN</div>
                            </div>
                        </div>

                        <div class="d-flex align-items-center mb-4">
                            <span class="badge rounded-circle border me-3">3</span>

                            <div>
                                <small class="text-light">STEP 3</small>
                                <div class="text-white fw-bold">ADD-ONS</div>
                            </div>
                        </div>

                        <div class="d-flex align-items-center">
                            <span class="badge rounded-circle border me-3">4</span>

                            <div>
                                <small class="text-light">STEP 4</small>
                                <div class="text-white fw-bold">SUMMARY</div>
                            </div>
                        </div>

                    </div>

                </div>

                <div class="col-9 d-flex flex-column">

                    <div class="flex-grow-1">
                    </div>

                    <div class="text-end">
                        <button class="btn btn-primary">
                            Next Step
                        </button>
                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
