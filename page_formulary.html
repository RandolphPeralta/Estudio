<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Multi Step</title>

    <link rel="stylesheet" href="style_formulary.css">
</head>
<body>

    <div class="contenedor">

        <div class="sidebar">

            <div class="paso">
                <div class="numero activo">1</div>

                <div>
                    <p>STEP 1</p>
                    <h4>YOUR INFO</h4>
                </div>
            </div>

            <div class="paso">
                <div class="numero">2</div>

                <div>
                    <p>STEP 2</p>
                    <h4>SELECT PLAN</h4>
                </div>
            </div>

            <div class="paso">
                <div class="numero">3</div>

                <div>
                    <p>STEP 3</p>
                    <h4>ADD-ONS</h4>
                </div>
            </div>

            <div class="paso">
                <div class="numero">4</div>

                <div>
                    <p>STEP 4</p>
                    <h4>SUMMARY</h4>
                </div>
            </div>

        </div>

        <div class="formulario">

            <h1>Personal info</h1>

            <p class="descripcion">
                Please provide your name, email address, and phone number.
            </p>

            <div class="grupo">
                <label>Nombre</label>
                <input type="text" placeholder="e.g. Stephen King">
            </div>

            <div class="grupo">
                <label>Email</label>
                <input type="email" placeholder="e.g. stephenking@lorem.com">
            </div>

            <div class="grupo">
                <label>Teléfono</label>
                <input type="text" placeholder="e.g. +1 234 567 890">
            </div>

            <div class="botones">

                <button class="next">Next Step</button>

            </div>
            

        </div>

    </div>

</body>
</html>
