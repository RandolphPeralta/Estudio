<!DOCTYPE html>
<html lang="en">
<head>
    <title>Formulario</title>
    <link rel="stylesheet" href="stylesss.css">
</head>
<body>

    <div class="contenedor">

        <!-- PARTE IZQUIERDA -->

        <div class="izquierda">

            <div class="paso">
                <div class="circulo activo">1</div>

                <div>
                    <p class="texto1">STEP 1</p>
                    <p class="texto2">YOUR INFO</p>
                </div>
            </div>

            <div class="paso">
                <div class="circulo">2</div>

                <div>
                    <p class="texto1">STEP 2</p>
                    <p class="texto2">SELECT PLAN</p>
                </div>
            </div>

            <div class="paso">
                <div class="circulo">3</div>

                <div>
                    <p class="texto1">STEP 3</p>
                    <p class="texto2">ADD-ONS</p>
                </div>
            </div>

            <div class="paso">
                <div class="circulo">4</div>

                <div>
                    <p class="texto1">STEP 4</p>
                    <p class="texto2">SUMMARY</p>
                </div>
            </div>

            <div class="circulo-naranja"></div>
            <div class="circulo-morado"></div>
            <div class="circulo-rosa"></div>

        </div>

        <!-- PARTE DERECHA -->

        <div class="derecha">

            <h1>Personal info</h1>

            <p class="descripcion">
                Please provide your name, email address, and phone number.
            </p>

            <p>Name</p>
            <input type="text" placeholder="e.g. Stephen King">

            <p>Email Address</p>
            <input type="text" placeholder="e.g. stephenking@lorem.com">

            <p>Phone Number</p>
            <input type="text" placeholder="e.g. +1 234 567 890">

            <button>Next Step</button>

        </div>

    </div>

</body>
</html>
