<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Multi Step</title>

    <link rel="stylesheet" href="style_formulary.css">
</head>

<body>

    <div class="contenedor">

        <div class="sidebar">

            <div class="paso">
                <div class="numero activo">1</div>

                <div>
                    <p>STEP 1</p>
                    <h4>YOUR INFO</h4>
                </div>
            </div>

            <div class="paso">
                <div class="numero">2</div>

                <div>
                    <p>STEP 2</p>
                    <h4>SELECT PLAN</h4>
                </div>
            </div>

            <div class="paso">
                <div class="numero">3</div>

                <div>
                    <p>STEP 3</p>
                    <h4>ADD-ONS</h4>
                </div>
            </div>

            <div class="paso">
                <div class="numero">4</div>

                <div>
                    <p>STEP 4</p>
                    <h4>SUMMARY</h4>
                </div>
            </div>

        </div>

        <div class="formulario">

            <h1>Select your plan</h1>

            <p class="descripcion">
                You have the option of monthly or yearly billing.
            </p>

            <!-- Contenedor de tarjetas -->
            <div class="planes">

                <!-- Plan 1 -->
                <div class="card-plan activo-plan">

                    <img src="icon-arcade.svg" alt="Arcade">

                    <div>
                        <h3>Arcade</h3>
                        <p>$9/mo</p>
                    </div>

                </div>

                <!-- Plan 2 -->
                <div class="card-plan">

                    <img src="icon-advanced.svg" alt="Advanced">

                    <div>
                        <h3>Advanced</h3>
                        <p>$12/mo</p>
                    </div>

                </div>

                <!-- Plan 3 -->
                <div class="card-plan">

                    <img src="icon-pro.svg" alt="Pro">

                    <div>
                        <h3>Pro</h3>
                        <p>$15/mo</p>
                    </div>

                </div>

            </div>

            <!-- Selector -->
            <div class="toggle">

                <span class="activo-texto">Monthly</span>

                <div class="switch">
                    <div class="circle"></div>
                </div>

                <span>Yearly</span>

            </div>

            <!-- Botones -->
            <div class="botones">

                <button class="back">Go Back</button>

                <button class="next">Next Step</button>

            </div>

        </div>

    </div>

</body>

</html>
