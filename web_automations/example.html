<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Página de Ejemplo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f9;
      margin: 0;
      padding: 0;
    }

    header {
      background-color: #4CAF50;
      color: white;
      text-align: center;
      padding: 1rem;
    }

    nav {
      background-color: #333;
      padding: 0.5rem;
    }

    nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
    }

    nav a:hover {
      text-decoration: underline;
    }

    main {
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      padding: 15px;
      margin-bottom: 20px;
    }

    footer {
      background-color: #4CAF50;
      color: white;
      text-align: center;
      padding: 1rem;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
  </style>
</head>
<body>
  <header>
    <h1>Bienvenido a Mi Página</h1>
  </header>

  <nav>
    <a href="#">Inicio</a>
    <a href="#">Acerca de</a>
    <a href="#">Contacto</a>
  </nav>

  <main>
    <div class="card">
      <h2>Sección 1</h2>
      <p>Este es un ejemplo de contenido dentro de una tarjeta.</p>
    </div>

    <div class="card">
      <h2>Sección 2</h2>
      <p>Otra tarjeta con texto de ejemplo.</p>
    </div>
  </main>

  <footer>
    <p>© 2026 Mi Página de Ejemplo</p>
  </footer>
</body>
</html>
