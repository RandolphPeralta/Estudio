<!DOCTYPE html>
<html lang = "en">
<head>
    <tittle><h1>Fomulario</h1></tittle>
</head>
<body>
    <h2>Formulario</h2>
    <!-- aca el method en el video era post -->
    <form action="prueba.html" method="get">
        <p><label for="nombre">Nombre: <input type="text" id="nombre"></label></p>
        <p><label for="apellido">Apellido: <input type="text" id="apellido"></label></p>
        <p><label for="edad">Edad: <input type="text" id="edad"></label></p>
        <p><label for="observacion">Observacion:<textarea id="observacion"></textarea> </label></p>


        <p><label> Estatura: 
            <select id="estatura">
                <option value="< 1,50"> < 1,50 mts </option>
                <option value="1,51 a 1,60"> 1,51 a 1,60 mts </option>
                <option value="1,61 a 1,70" > 1,61 a 1,70 mts </option>
                <option value="1,71 a 1,80"> 1,79 a 1,80 mts </option>
                <option value="> 1,80"> > 1,80 mts </option>
                <!-- se puede colocar selected o diseable al lado de la etiqueta opcion value para el primer lo selecciones y el otro no -->
            </select>

        </label></p>

        <p><b>Color de ojos:</b></p>
        <input type="checkbox" value="marron">
        <label>Marrón</label> <br>
        <input type="checkbox" value="verde">
        <label>Verde</label> <br>
        <input type="checkbox" value="celeste">
        <label>Celeste</label> <br>
        <input type="checkbox" value="otro">
        <label>Otro</label> <br>

        <!-- podemos colocar checked para que ya este seleccionado al lado del value -->
        <!-- se puede cambiar el type checkbox por radio (que significa que sea un circulo en la seleccion) -->
        
        <br>
        <button type="submit">Enviar</button>
    </form>
</body>

</html>
