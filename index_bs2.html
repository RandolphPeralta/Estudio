<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-secondary-subtle">

    <div class="container vh-100 d-none d-md-flex justify-content-center align-items-center">

        <div class="bg-white rounded-4 shadow-lg col-10">

            <div class="row p-3">

                <div class="col-3 position-relative">

                    <img src="bg-sidebar.svg" class="img-fluid rounded-3 w-100" alt="Sidebar">

                    <div class="position-absolute top-0 start-0 w-100 h-100">

                        <div class="p-4">

                            <div class="d-flex align-items-center mb-4">
                                <span class="badge rounded-circle border me-3">1</span>

                                <div>
                                    <small class="text-light">STEP 1</small>
                                    <div class="text-white fw-bold">YOUR INFO</div>
                                </div>
                            </div>

                            <div class="d-flex align-items-center mb-4">
                                <span class="badge rounded-circle text-bg-light me-3">2</span>

                                <div>
                                    <small class="text-light">STEP 2</small>
                                    <div class="text-white fw-bold">SELECT PLAN</div>
                                </div>
                            </div>

                            <div class="d-flex align-items-center mb-4">
                                <span class="badge rounded-circle border me-3">3</span>

                                <div>
                                    <small class="text-light">STEP 3</small>
                                    <div class="text-white fw-bold">ADD-ONS</div>
                                </div>
                            </div>

                            <div class="d-flex align-items-center">
                                <span class="badge rounded-circle border me-3">4</span>

                                <div>
                                    <small class="text-light">STEP 4</small>
                                    <div class="text-white fw-bold">SUMMARY</div>
                                </div>
                            </div>

                        </div>

                    </div>

                </div>

                <div class="col-9">

                    <div class="row h-100 justify-content-center">

                        <div class="col-8 d-flex flex-column">

                            <div class="flex-grow-1">

                                <h1 class="fw-bold text-primary">
                                    Select your plan
                                </h1>

                                <p class="text-secondary mb-4">
                                    You have the option of monthly or yearly billing.
                                </p>

                                <div class="row g-3 mb-4">

                                    <div class="col-md-4">
                                        <div class="card h-100">
                                            <div class="card-body">

                                                <img src="icon-arcade.svg" alt="Arcade" class="mb-4">

                                                <h5 class="card-title mb-1">
                                                    Arcade
                                                </h5>

                                                <p class="text-secondary mb-0">
                                                    $9/mo
                                                </p>

                                            </div>
                                        </div>
                                    </div>

                                    <div class="col-md-4">
                                        <div class="card h-100">
                                            <div class="card-body">

                                                <img src="icon-advanced.svg" alt="Advanced" class="mb-4">

                                                <h5 class="card-title mb-1">
                                                    Advanced
                                                </h5>

                                                <p class="text-secondary mb-0">
                                                    $12/mo
                                                </p>

                                            </div>
                                        </div>
                                    </div>

                                    <div class="col-md-4">
                                        <div class="card h-100">
                                            <div class="card-body">

                                                <img src="icon-pro.svg" alt="Pro" class="mb-4">

                                                <h5 class="card-title mb-1">
                                                    Pro
                                                </h5>

                                                <p class="text-secondary mb-0">
                                                    $15/mo
                                                </p>

                                            </div>
                                        </div>
                                    </div>

                                </div>

                                <div class="bg-light rounded p-3">

                                    <div class="d-flex justify-content-center align-items-center gap-3">

                                        <span class="fw-semibold">
                                            Monthly
                                        </span>

                                        <div class="form-check form-switch m-0">

                                            <input class="form-check-input" type="checkbox" id="billing">

                                        </div>

                                        <span class="text-secondary">
                                            Yearly
                                        </span>

                                    </div>

                                </div>

                            </div>

                            <div class="d-flex justify-content-between">

                                <a href="index_bs.html" class="btn btn-link text-secondary text-decoration-none">
                                    Go Back
                                </a>

                                <a href="index_bs3.html" class="btn btn-primary">
                                    Next Step
                                </a>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!--Version-Movil-->

    <div class="d-md-none position-relative">

        <img src="bg-sidebar-mobile.svg" class="img-fluid w-100" alt="Mobile Sidebar">

        <div class="position-absolute top-0 start-50 translate-middle-x mt-4">

            <div class="d-flex gap-3">

                <span class="badge rounded-circle text-bg-light">1</span>

                <span class="badge rounded-circle border border-white">
                    2
                </span>

                <span class="badge rounded-circle border border-white">
                    3
                </span>

                <span class="badge rounded-circle border border-white">
                    4
                </span>

            </div>

        </div>

        <div class="position-absolute start-50 translate-middle-x w-100 px-3">

            <div class="card border-0 shadow rounded-4">

                <div class="card-body">

                    <!-- contenido -->

                </div>

            </div>

        </div>

        <div class="d-md-none fixed-bottom bg-white p-3">

            <div class="d-flex justify-content-between">

                <button class="btn btn-link text-secondary">
                    Go Back
                </button>

                <button class="btn btn-primary">
                    Next Step
                </button>

            </div>

        </div>

    </div>

</body>

</html>
