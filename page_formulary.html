<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Multi Step</title>
    <link rel="stylesheet" href="style_formulary.css">
    <link rel="icon" type="png" sizes="32x32" href="favicon-32x32.png">
</head>

<body>

    <div class="contenedor">

        <div class="sidebar">

            <div class="phase">
                <div class="number on">1</div>

                <div class="phase_paragraph">
                    <p>STEP 1</p>
                    <h5>YOUR INFO</h5>
                </div>
            </div>

            <div class="phase">
                <div class="number">2</div>

                <div class="phase_paragraph">
                    <p>STEP 2</p>
                    <h5>SELECT PLAN</h5>
                </div>
            </div>

            <div class="phase">
                <div class="number">3</div>

                <div class="phase_paragraph">
                    <p>STEP 3</p>
                    <h5>ADD-ONS</h5>
                </div>
            </div>

            <div class="phase">
                <div class="number">4</div>

                <div class="phase_paragraph">
                    <p>STEP 4</p>
                    <h5>SUMMARY</h5>
                </div>
            </div>

        </div>

        <div class="step-actions">

            <h1>Personal info</h1>

            <p>Please provide your name, email address, and phone number.</p>
            <div class="step-actions__content">
                <form action="">

                    <div class="grupo">
                        <div class="top">
                            <h4>Name</h4>
                            <span class="error">This field is required</span>
                        </div>
                        <input type="text" placeholder="e.g. Stephen King" required>
                    </div>

                    <div class="grupo">
                        <div class="top">
                            <h4>Email</h4>
                            <span class="error">This field is required</span>
                        </div>
                        <input type="email" placeholder="e.g. stephenking@lorem.com" required>
                    </div>

                    <div class="grupo">
                        <div class="top">
                            <h4>Phone Number</h4>
                            <span class="error">This field is required</span>
                        </div>
                        <input type="text" placeholder="e.g. +1 234 567 890" required>
                    </div>

            </div>

            <div type="submit" class="botones">

                <button class="next">Next Step</button>

            </div>
            

            </form>

            




        </div>

    </div>

</body>

</html>
