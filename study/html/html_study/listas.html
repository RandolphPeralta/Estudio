<!DOCTYPE html>
<html lang="en">
<head>
    <title>Ejemplo de listas</title>
</head>
<body>
    <!-- puedes colocar al lado de la etiqueta ol colocar start="numero del cual quiere comenzar" -->
    <!-- para el tipo si quires colocar letras minusculas:a, mayusculas:A, letras griegas minusculas:i , letras griegas Mayusculas: I-->
    <ol type="a">
        <li>River</li>
        <li>Boca</li>
        <li>Independiente</li>
        <li>Racing</li>
    </ol>

    <ul style="list-style-type: circle">
        <li>Salchipapa</li>
        <li>Hamburguesas</li>
        <li>Pizzas</li>
        <li>Sandwich</li>
    </ul>
</body>
</html>
