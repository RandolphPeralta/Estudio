<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Multi Step</title>
    <link rel="stylesheet" href="style_formulary.css">
</head>

<body>

    <div class="contenedor">

        <div class="sidebar">

            <div class="paso">
                <div class="numero activo">1</div>

                <div>
                    <p>STEP 1</p>
                    <h5>YOUR INFO</h5>
                </div>
            </div>

            <div class="paso">
                <div class="numero">2</div>

                <div>
                    <p>STEP 2</p>
                    <h4>SELECT PLAN</h4>
                </div>
            </div>

            <div class="paso">
                <div class="numero">3</div>

                <div>
                    <p>STEP 3</p>
                    <h4>ADD-ONS</h4>
                </div>
            </div>

            <div class="paso">
                <div class="numero">4</div>

                <div>
                    <p>STEP 4</p>
                    <h4>SUMMARY</h4>
                </div>
            </div>

        </div>

        <div class="title_paragraph">

            <h1>Personal info</h1>

            <p class="description">
                Please provide your name, email address, and phone number.
            </p>

            <form action="">

                <div class="grupo">
                    <div class="top">
                        <h4>Name</h4>
                        <span class="error">This field is required</span>
                    </div>
                    <input type="text" placeholder="e.g. Stephen King" required>
                </div>

                <div class="grupo">
                    <div class="top">
                        <h4>Email</h4>
                        <span class="error">This field is required</span>
                    </div>
                    <input type="email" placeholder="e.g. stephenking@lorem.com" required>
                </div>

                <div class="grupo">
                    <div class="top">
                        <h4>Phone Number</h4>
                        <span class="error">This field is required</span>
                    </div>
                    <input type="text" placeholder="e.g. +1 234 567 890" required>
                </div>


                <div type="submit" class="botones">

                    <button class="next">Next Step</button>

                </div>

            </form>




        </div>

    </div>

</body>

</html>
