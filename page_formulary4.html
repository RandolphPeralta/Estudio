<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Multi Step</title>

    <link rel="stylesheet" href="style_formulary4.css">
</head>

<body>

    <div class="contenedor">

        <div class="sidebar">

            <div class="paso">
                <div class="numero activo">1</div>

                <div>
                    <p>STEP 1</p>
                    <h4>YOUR INFO</h4>
                </div>
            </div>

            <div class="paso">
                <div class="numero">2</div>

                <div>
                    <p>STEP 2</p>
                    <h4>SELECT PLAN</h4>
                </div>
            </div>

            <div class="paso">
                <div class="numero">3</div>

                <div>
                    <p>STEP 3</p>
                    <h4>ADD-ONS</h4>
                </div>
            </div>

            <div class="paso">
                <div class="numero">4</div>

                <div>
                    <p>STEP 4</p>
                    <h4>SUMMARY</h4>
                </div>
            </div>

        </div>

        <div class="formulario">

            <h1>Finishing up</h1>

            <p class="descripcion">
                Double-check everything looks OK before confirming.
            </p>

            <!-- Caja resumen -->
            <div class="summary-box">

                <!-- Plan principal -->
                <div class="plan-info">

                    <div>
                        <h3>Arcade (Monthly)</h3>

                        <a href="#">Change</a>
                    </div>

                    <h3>$9/mo</h3>

                </div>

                <!-- Línea -->
                <hr>

                <!-- Addon 1 -->
                <div class="addon-summary">

                    <p>Online service</p>

                    <span>+$1/mo</span>

                </div>

                <!-- Addon 2 -->
                <div class="addon-summary">

                    <p>Larger storage</p>

                    <span>+$2/mo</span>

                </div>

            </div>

            <!-- Total -->
            <div class="total">

                <p>Total (per month)</p>

                <h2>+$12/mo</h2>

            </div>

            <!-- Botones -->
            <div class="botones">

                <button class="back">Go Back</button>

                <button class="confirm">Confirm</button>

            </div>

        </div>

    </div>

</body>

</html>
