<!DOCTYPE html>
<html lang="en">
<head>
    <title>Prueba_Telefono</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Fondo superior -->
    <div class="top-background">

        <div class="steps">

            <div class="step active">1</div>
            <div class="step">2</div>
            <div class="step">3</div>
            <div class="step">4</div>

        </div>

    </div>

    <!-- Tarjeta -->
    <main class="card">

        <h1>Select your plan</h1>

        <p class="description">
            You have the option of monthly or yearly billing.
        </p>

        <!-- Planes -->

        <div class="plan selected">

            <div class="icon arcade"></div>

            <div>
                <h3>Arcade</h3>
                <span>$9/mo</span>
            </div>

        </div>

        <div class="plan">

            <div class="icon advanced"></div>

            <div>
                <h3>Advanced</h3>
                <span>$12/mo</span>
            </div>

        </div>

        <div class="plan">

            <div class="icon pro"></div>

            <div>
                <h3>Pro</h3>
                <span>$15/mo</span>
            </div>

        </div>

        <!-- Switch -->

        <div class="toggle-container">

            <span>Monthly</span>

            <label class="switch">

                <input type="checkbox">

                <span class="slider"></span>

            </label>

            <span>Yearly</span>

        </div>

    </main>

    <!-- Footer -->

    <footer>

        <button class="back">Go Back</button>

        <button class="next">Next Step</button>

    </footer>

</body>
</html>
