<!DOCTYPE html>
<html lang="en">
<head>
    <title>Prueba_Formulario</title>
    <link rel="stylesheet" href="estilo_formulario.css">
</head>
<body>
    <div class = "container">
        <div class ="list">
        <ol class="list__items">
            <li>
                <h5>STEP 1</h5>
                <p>YOUR INFO</p>
            </li>
            <li>
                <h5>STEP 2</h5>
                <p>SELECT PLAN</p>
            </li>
            <li>
                <h5>STEP 3</h5>
                <p>ADD-ONS</p>
            </li>
            <li>
                <h5>STEP 4</h5>
                <p>SUMMARY</p>
            </li>
        </ol>
    </div>
    <div class="formulary">
        <h1 class = "formulary__title">Personal info</h1>
        <p class = "formulary__paragraph">Please provide your name, email addres, and phone number</p>
        <form>
            <p class = "formulary__item"><label  for="nombre">Name</label><input type="text"></p>
            <p class = "formulary__item"><label for="email">Email Addres</label><input type="text"></p>
            <p class = "formulary__item"><label for="phone">Phone Number</label><input type="text"></p>
        </form>
        <button class = "formulary__buttom" >Next Step</button>
        
    </div>
</div>
    
</body>
</html>
