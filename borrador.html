<!DOCTYPE html>
<html lang="en">

<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="icon" type="png" sizes="32x32" href="favicon-32x32.png">
      <link rel="stylesheet" href="style_borrador.css">
      <title>Frontend Mentor | Multi-step form</title>
</head>

<body>
      <div class="contenedor">

            <div class="sidebar">

                  <div class="paso">
                        <div class="number on">1</div>
                        <div class="paso_parrafo">
                              <p>STEP 1</p>
                              <h4>YOUR INFO</h4>
                        </div>
                  </div>

                  <div class="paso">
                        <div class="number">2</div>

                        <div class="paso_parrafo">
                              <p>STEP 2</p>
                              <h4>SELECT PLAN</h4>
                        </div>
                  </div>

                  <div class="paso">
                        <div class="number">3</div>

                        <div class="paso_parrafo">
                              <p>STEP 3</p>
                              <h4>ADD-ONS</h4>
                        </div>
                  </div>

                  <div class="paso">
                        <div class="number">4</div>

                        <div class="paso_parrafo">
                              <p>STEP 4</p>
                              <h4>SUMMARY</h4>
                        </div>
                  </div>

            </div>

            <div class="step-actions">

                  <h1>Personal info</h1>

                  <p>Please provide your name, email address, and phone number.</p>

                  <div class="step-actions__contenido">
                  </div>

                  <div type="submit" class="botones">

                        <button class="next">Next Step</button>

                  </div>

            </div>

      </div>

</body>

</html>
